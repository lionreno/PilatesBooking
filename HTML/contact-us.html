<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Contact — Pure Balance Pilates</title>
  <link rel="stylesheet" href="../CSS/style.css">
  <script src="../JS/navbar.js" defer></script>
  <script src="../JS/contact-validation.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand">
        <img src="../Media/logoimage.jpg" alt="logo" class="logo">
        <span class="brand-text">Pure Balance Pilates</span>
      </a>
      <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="main-nav">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="about-us.html">About</a></li>
          <li><a href="gallery.html">Gallery</a></li>
          <li><a href="booking.html">Booking</a></li>
          <li><a href="contact-us.html" class="active">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <section>
      <h1>Contact Us</h1>
      <p>Fill in the form and we will get back to you soon.</p>
    </section>

    <section class="contact-form">
      <form id="contactForm" novalidate>
        <fieldset>
          <legend>Contact Information</legend>
          <div id="contactErrors" class="error-messages"></div>

          <label for="fname">First Name</label>
          <input id="fname" name="fname" type="text" placeholder="Enter your first name" 
                 required maxlength="50" pattern="[A-Za-z\s]+" 
                 title="First name must contain only letters and spaces">
          <span class="field-error" id="fname-error"></span>

          <label for="lname">Last Name</label>
          <input id="lname" name="lname" type="text" placeholder="Enter your last name" 
                 required maxlength="50" pattern="[A-Za-z\s]+" 
                 title="Last name must contain only letters and spaces">
          <span class="field-error" id="lname-error"></span>

          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="Enter your email address" 
                 required maxlength="100" 
                 title="Please enter a valid email address">
          <span class="field-error" id="email-error"></span>

          <label for="phone">Phone (Optional)</label>
          <input id="phone" name="phone" type="tel" placeholder="Enter your phone number (e.g., +966501234567)" 
                 maxlength="20" pattern="[\+]?[0-9\s\-\(\)]+" 
                 title="Please enter a valid phone number">
          <span class="field-error" id="phone-error"></span>

          <label for="subject">Subject</label>
          <select id="subject" name="subject" required>
            <option value="">Select Subject</option>
            <option value="General Inquiry">General Inquiry</option>
            <option value="Class Information">Class Information</option>
            <option value="Membership">Membership</option>
            <option value="Feedback">Feedback</option>
            <option value="Other">Other</option>
          </select>
          <span class="field-error" id="subject-error"></span>

          <label for="message">Message</label>
          <textarea id="message" name="message" rows="6" placeholder="Type your message here..." 
                    required minlength="10" maxlength="1000"></textarea>
          <span class="field-error" id="message-error"></span>

          <div class="form-actions">
            <button type="submit" class="btn">Send</button>
            <button type="reset" class="btn btn-outline">Clear</button>
          </div>
        </fieldset>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-grid">
      <div>
        <h4>Pure Balance Pilates</h4>
        <p>Get in touch with us anytime.</p>
      </div>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="about-us.html">About</a></li>
          <li><a href="booking.html">Booking</a></li>
          <li><a href="contact-us.html">Contact</a></li>
          <li><a href="gallery.html">Gallery</a></li>
        </ul>
      </nav>
    </div>
  </footer>
</body>
</html>
