<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Booking — Pure Balance Pilates</title>
  <link rel="stylesheet" href="../CSS/style.css">
  <script src="../JS/navbar.js" defer></script>
  <script src="../JS/booking-validation.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand">
        <img src="../Media/logoimage.jpg" alt="logo" class="logo">
        <span class="brand-text">Pure Balance Pilates</span>
      </a>
      <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="main-nav">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="about-us.html">About</a></li>
          <li><a href="gallery.html">Gallery</a></li>
          <li><a href="booking.html" class="active">Booking</a></li>
          <li><a href="contact-us.html">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <section>
      <h1>Book Your Class</h1>
      <p>Choose your preferred time between 8:00 AM and 4:00 PM.</p>
    </section>

    <section class="booking-form">
      <form id="bookingForm" novalidate>
        <fieldset>
          <legend>Booking Details</legend>
          <div id="bookingErrors" class="error-messages"></div>

          <label for="fname">First Name</label>
          <input id="fname" name="fname" type="text" placeholder="Enter your first name" 
                 required maxlength="50" pattern="[A-Za-z\s]+" 
                 title="First name must contain only letters and spaces">
          <span class="field-error" id="fname-error"></span>

          <label for="lname">Last Name</label>
          <input id="lname" name="lname" type="text" placeholder="Enter your last name" 
                 required maxlength="50" pattern="[A-Za-z\s]+" 
                 title="Last name must contain only letters and spaces">
          <span class="field-error" id="lname-error"></span>

          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="Enter your email address" 
                 required maxlength="100" 
                 title="Please enter a valid email address">
          <span class="field-error" id="email-error"></span>

          <label for="date">Date</label>
          <input id="date" name="date" type="date" required min="">
          <span class="field-error" id="date-error"></span>

          <label for="time">Time</label>
          <select id="time" name="time" required>
            <option value="">Select Time</option>
            <option value="08:00">08:00</option>
            <option value="09:00">09:00</option>
            <option value="10:00">10:00</option>
            <option value="11:00">11:00</option>
            <option value="12:00">12:00</option>
            <option value="13:00">13:00</option>
            <option value="14:00">14:00</option>
            <option value="15:00">15:00</option>
            <option value="16:00">16:00</option>
          </select>
          <span class="field-error" id="time-error"></span>

          <label for="type">Class Type</label>
          <select id="type" name="type" required>
            <option value="">Select Type</option>
            <option value="Starter">Starter</option>
            <option value="Flow">Flow</option>
            <option value="Restore">Restore</option>
          </select>
          <span class="field-error" id="type-error"></span>

          <label for="phone">Phone</label>
          <input id="phone" name="phone" type="tel" placeholder="Enter your phone number (e.g., +966501234567)" 
                 required maxlength="20" pattern="[\+]?[0-9\s\-\(\)]+" 
                 title="Please enter a valid phone number">
          <span class="field-error" id="phone-error"></span>

          <label for="participants">Number of Participants</label>
          <input id="participants" name="participants" type="number" min="1" max="10" 
                 value="1" required title="Number of participants (1-10)">
          <span class="field-error" id="participants-error"></span>

          <label for="notes">Notes</label>
          <textarea id="notes" name="notes" rows="4" placeholder="Add any notes or special requests..." 
                    maxlength="500"></textarea>
          <span class="field-error" id="notes-error"></span>

          <div class="form-actions">
            <button type="submit" class="btn">Confirm</button>
            <button type="reset" class="btn btn-outline">Reset</button>
          </div>
        </fieldset>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-grid">
      <div>
        <h4>Pure Balance Pilates</h4>
        <p>We care about your comfort.</p>
      </div>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="about-us.html">About</a></li>
          <li><a href="booking.html">Booking</a></li>
          <li><a href="contact-us.html">Contact</a></li>
          <li><a href="gallery.html">Gallery</a></li>
        </ul>
      </nav>
    </div>
  </footer>
</body>
</html>
